name: glm-ocr-stack

services:
  vllm:
    image: ${VLLM_IMAGE:-glm-ocr-vllm:nightly}
    container_name: ${VLLM_CONTAINER_NAME:-glm-ocr-vllm}
    restart: unless-stopped
    gpus: all
    ipc: host
    ports:
      - "${VLLM_HOST_PORT:-8080}:8000"
    volumes:
      - ${HF_CACHE_DIR:-../runtime/huggingface}:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
    command:
      - --model
      - ${MODEL_NAME:-zai-org/GLM-OCR}
      - --allowed-local-media-path
      - /
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":1}'
      - --served-model-name
      - ${SERVED_MODEL_NAME:-glm-ocr}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 360s
      retries: 10

  pipeline:
    image: ${PIPELINE_IMAGE:-glm-ocr-pipeline:local}
    container_name: ${PIPELINE_CONTAINER_NAME:-glm-ocr-pipeline}
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "${PIPELINE_HOST_PORT:-5002}:5002"
    volumes:
      - ${HF_CACHE_DIR:-../runtime/huggingface}:/root/.cache/huggingface
      - ../deploy/glm-ocr/server.config.yaml:/etc/glm-ocr/server.config.yaml:ro
    environment:
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      GLMOCR_LOG_LEVEL: ${GLMOCR_LOG_LEVEL:-INFO}
      GLMOCR_OCR_API_HOST: ${GLMOCR_OCR_API_HOST:-vllm}
      GLMOCR_OCR_API_PORT: ${GLMOCR_OCR_API_PORT:-8000}
      GLMOCR_OCR_MODEL: ${GLMOCR_OCR_MODEL:-glm-ocr}
      GLMOCR_ENABLE_LAYOUT: ${GLMOCR_ENABLE_LAYOUT:-false}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-glm-ocr-backend:local}
    container_name: ${BACKEND_CONTAINER_NAME:-glm-ocr-backend}
    restart: unless-stopped
    depends_on:
      pipeline:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ${BACKEND_DATA_DIR:-../runtime/backend-data}:/app/data
    environment:
      LAYOUT_OCR_URL: ${LAYOUT_OCR_URL:-http://pipeline:5002/glmocr/parse}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/tasks.db}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      DEBUG: ${BACKEND_DEBUG:-false}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 10

  frontend:
    image: ${FRONTEND_IMAGE:-glm-ocr-frontend:local}
    container_name: ${FRONTEND_CONTAINER_NAME:-glm-ocr-frontend}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
