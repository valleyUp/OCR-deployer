name: glm-ocr-stack

services:
  vllm:
    image: ${VLLM_IMAGE:-glm-ocr-vllm:nightly}
    container_name: ${VLLM_CONTAINER_NAME:-glm-ocr-vllm}
    restart: unless-stopped
    gpus: all
    ipc: host
    ports:
      - "${VLLM_HOST_PORT:-8080}:8000"
    volumes:
      - ${HF_CACHE_DIR:-../runtime/huggingface}:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      NVIDIA_VISIBLE_DEVICES: ${VLLM_GPU_DEVICES-0}
      CUDA_VISIBLE_DEVICES: ${VLLM_GPU_DEVICES-0}
    command:
      - ${MODEL_NAME:-zai-org/GLM-OCR}
      - --tensor-parallel-size
      - ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --allowed-local-media-path
      - /
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":${VLLM_NUM_SPECULATIVE_TOKENS:-3}}'
      - --served-model-name
      - ${SERVED_MODEL_NAME:-glm-ocr}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 360s
      retries: 10

  pipeline:
    image: ${PIPELINE_IMAGE:-glm-ocr-pipeline:local}
    container_name: ${PIPELINE_CONTAINER_NAME:-glm-ocr-pipeline}
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    gpus: all
    ipc: host
    ports:
      - "${PIPELINE_HOST_PORT:-5002}:5002"
    volumes:
      - ${HF_CACHE_DIR:-../runtime/huggingface}:/root/.cache/huggingface
      - ../deploy/glm-ocr/server.config.yaml:/etc/glm-ocr/server.config.yaml:ro
    environment:
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      NVIDIA_VISIBLE_DEVICES: ${LAYOUT_GPU_DEVICES-0}
      CUDA_VISIBLE_DEVICES: ${LAYOUT_GPU_DEVICES-0}
      GLMOCR_CONFIG_PATH: ${GLMOCR_CONFIG_PATH:-/etc/glm-ocr/server.config.yaml}
      GLMOCR_LOG_LEVEL: ${GLMOCR_LOG_LEVEL:-INFO}
      GLMOCR_MODE: ${GLMOCR_MODE:-selfhosted}
      GLMOCR_OCR_API_HOST: ${GLMOCR_OCR_API_HOST:-vllm}
      GLMOCR_OCR_API_PORT: ${GLMOCR_OCR_API_PORT:-8000}
      GLMOCR_OCR_MODEL: ${GLMOCR_OCR_MODEL:-glm-ocr}
      GLMOCR_LAYOUT_CUDA_VISIBLE_DEVICES: ${LAYOUT_GPU_DEVICES-0}
      GLMOCR_LAYOUT_DEVICE: ${LAYOUT_DEVICE:-cuda:0}
      PIPELINE_SERVER_MODE: ${PIPELINE_SERVER_MODE:-gunicorn}
      PIPELINE_SERVER_PORT: ${PIPELINE_SERVER_PORT:-5002}
      PIPELINE_GUNICORN_WORKERS: ${PIPELINE_GUNICORN_WORKERS:-1}
      PIPELINE_GUNICORN_THREADS: ${PIPELINE_GUNICORN_THREADS:-8}
      PIPELINE_GUNICORN_TIMEOUT: ${PIPELINE_GUNICORN_TIMEOUT:-300}
      PIPELINE_GUNICORN_GRACEFUL_TIMEOUT: ${PIPELINE_GUNICORN_GRACEFUL_TIMEOUT:-60}
      PIPELINE_GUNICORN_KEEPALIVE: ${PIPELINE_GUNICORN_KEEPALIVE:-10}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-glm-ocr-backend:local}
    container_name: ${BACKEND_CONTAINER_NAME:-glm-ocr-backend}
    restart: unless-stopped
    depends_on:
      pipeline:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ${BACKEND_DATA_DIR:-../runtime/backend-data}:/app/data
    environment:
      LAYOUT_OCR_URL: ${LAYOUT_OCR_URL:-http://pipeline:5002/glmocr/parse}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/tasks.db}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      DEBUG: ${BACKEND_DEBUG:-false}
      FORMULA_RENDERER_SCRIPT: ${FORMULA_RENDERER_SCRIPT:-/opt/formula-renderer/render-formula.cjs}
      FORMULA_RENDER_TIMEOUT: ${FORMULA_RENDER_TIMEOUT:-20}
      WORKER_COUNT: ${WORKER_COUNT:-5}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-5}
      LAYOUT_PAGE_PARALLELISM: ${LAYOUT_PAGE_PARALLELISM:-1}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      OWNER_COOKIE_NAME: ${OWNER_COOKIE_NAME:-ocr_owner_token}
      OWNER_COOKIE_MAX_AGE_DAYS: ${OWNER_COOKIE_MAX_AGE_DAYS:-365}
      OWNER_COOKIE_SECURE: ${OWNER_COOKIE_SECURE:-false}
      PURGE_LEGACY_OWNERLESS_TASKS: ${PURGE_LEGACY_OWNERLESS_TASKS:-true}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 10

  frontend:
    image: ${FRONTEND_IMAGE:-glm-ocr-frontend:local}
    container_name: ${FRONTEND_CONTAINER_NAME:-glm-ocr-frontend}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
